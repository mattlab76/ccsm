name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Test on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3 bats

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash jq python3 bats-core

      - name: Check bash version
        run: bash --version | head -1

      - name: Run tests
        run: bash test/run_tests.sh
